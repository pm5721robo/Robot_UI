[build]
builder = "NIXPACKS"
buildCommand = "cd cloud && python -m pip install -r requirements.txt"

[deploy]
runtime = "V2"
numReplicas = 1
startCommand = "cd cloud && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
sleepApplication = true
useLegacyStacker = false
ipv6EgressEnabled = false
multiRegionConfig = {"asia-southeast1" = {numReplicas = 1}}
restartPolicyType = "ON_FAILURE"
healthcheckTimeout = 30
restartPolicyMaxRetries = 3